name: Test and Publish Agents

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.actor }}/green-agent
            ghcr.io/${{ github.actor }}/purple-agent
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      # --- Green Agent ---
      - name: Build Green Agent Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.green
          push: false
          tags: ghcr.io/${{ github.actor }}/green-agent:latest
          load: true
          platforms: linux/amd64

      # --- Purple Agent ---
      - name: Build Purple Agent Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.purple
          push: false
          tags: ghcr.io/${{ github.actor }}/purple-agent:latest
          load: true
          platforms: linux/amd64

      # --- Start Green Agent Container ---
      - name: Start Green Agent container
        run: |
          docker run -d -p 9009:9009 --name green-agent-container ghcr.io/${{ github.actor }}/green-agent:latest --host 0.0.0.0 --port 9009
          timeout 30 bash -c 'until curl -sf http://localhost:9009/.well-known/agent-card.json > /dev/null; do sleep 1; done'

      # --- Start Purple Agent Container ---
      - name: Start Purple Agent container
        env:
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}  # <--- API-Key muss in GitHub Secrets gesetzt sein
        run: |
          docker run -d -p 9018:9018 --name purple-agent-container -e NEBIUS_API_KEY=$NEBIUS_API_KEY ghcr.io/${{ github.actor }}/purple-agent:latest --host 0.0.0.0 --port 9018
          timeout 30 bash -c 'until curl -sf http://localhost:9018/.well-known/agent-card.json > /dev/null; do sleep 1; done'

      # --- Set up uv ---
      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      # --- Install test dependencies ---
      - name: Install test dependencies
        run: uv sync --extra test

      # --- Run tests for Green Agent ---
      - name: Run Green Agent tests
        run: uv run pytest -v --agent-url http://localhost:9009

      # --- Run tests for Purple Agent ---
      - name: Run Purple Agent tests
        env:
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
        run: uv run pytest -v --agent-url http://localhost:9018

      # --- Stop containers and show logs ---
      - name: Stop containers and show logs
        if: always()
        run: |
          echo "=== Green Agent Logs ==="
          docker logs green-agent-container || true
          docker stop green-agent-container || true

          echo "=== Purple Agent Logs ==="
          docker logs purple-agent-container || true
          docker stop purple-agent-container || true

      # --- Login to GHCR ---
      - name: Log in to GitHub Container Registry
        if: success() && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Push Docker images ---
      - name: Push Green Agent image
        if: success() && github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.actor }}/green-agent:latest

      - name: Push Purple Agent image
        if: success() && github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.actor }}/purple-agent:latest

      - name: Output image digest
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "## Docker Images Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**Green Agent:** ghcr.io/${{ github.actor }}/green-agent:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Purple Agent:** ghcr.io/${{ github.actor }}/purple-agent:latest" >> $GITHUB_STEP_SUMMARY
